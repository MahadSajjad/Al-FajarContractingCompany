<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Flag JS early so scroll-reveal only hides content when JS can reveal it. -->
    <script>
      document.documentElement.classList.add('js');
    </script>
    <!-- SVG primary (scales cleanly); PNG fallback for crawlers/browsers that
         don't render SVG favicons — both matter for showing up next to the
         site name in Google Search results (needs a square icon >48x48px). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E1C2B" />

    <!-- Fonts: Saira (display) · IBM Plex Sans (body) · IBM Plex Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking load: fetch in parallel with rendering, swap in once ready.
         `media="print"` tricks the browser into a low-priority fetch; the onload
         flips it to `all` and applies the stylesheet. noscript covers JS-off. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Saira:wght@500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Saira:wght@500;600;700;800&display=swap"
      />
    </noscript>

    <!-- title + description are injected per-page via the SEO component
         (vite-react-ssg Head). Intentionally omitted here to avoid duplicates. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
